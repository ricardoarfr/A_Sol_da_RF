<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RF Admin — Configuração de IA</title>
  <link rel="stylesheet" href="assets/css/main.css?v=1.0.0" />
</head>
<body>

  <header>
    <h1>RF Admin <span class="badge">v1.0</span></h1>
    <p>Painel de configuração do assistente WhatsApp</p>
  </header>

  <!-- Token auth -->
  <div class="card" id="token-section">
    <h2>Autenticação</h2>
    <form id="token-form">
      <div class="form-group">
        <label for="admin-token">Token de acesso</label>
        <input type="password" id="admin-token" placeholder="Insira o ADMIN_TOKEN" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn">Entrar</button>
    </form>
  </div>

  <!-- Config panel (hidden until authenticated) -->
  <div class="card" id="config-section" style="display:none;">
    <h2>Modelo de IA</h2>
    <form id="config-form">
      <div class="form-group">
        <label for="provider">Provedor</label>
        <select id="provider">
          <option value="">Selecione...</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="groq">Groq (gratuito)</option>
          <option value="google">Google Gemini</option>
          <option value="openrouter">OpenRouter</option>
        </select>
      </div>

      <div class="form-group">
        <label for="model">Modelo</label>
        <input
          type="text"
          id="model"
          list="model-suggestions"
          placeholder="Ex: gpt-4o, claude-sonnet-4-6, llama3-70b-8192"
          autocomplete="off"
        />
        <datalist id="model-suggestions"></datalist>
      </div>

      <div class="form-group">
        <label for="api-key">Chave de API</label>
        <input type="password" id="api-key" placeholder="Insira a chave de API" autocomplete="off" />
      </div>

      <hr class="divider" />

      <button type="submit" class="btn" id="save-btn">Salvar configuração</button>
      <div id="feedback" class="feedback"></div>
    </form>
  </div>

  <div style="max-width:520px;width:100%;display:flex;justify-content:flex-end;" id="logout-wrapper" style="display:none;">
    <button id="logout-btn" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;margin-top:4px;">
      Sair
    </button>
  </div>

  <footer>A Sol da RF &mdash; WhatsApp Assistant Backend</footer>

  <script type="module" src="assets/js/config.js?v=1.0.0"></script>
</body>
</html>
