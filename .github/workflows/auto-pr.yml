name: Auto PR

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'main',
              state: 'open',
            });

            if (prs.length > 0) {
              console.log(`PR já existe: ${prs[0].html_url}`);
              return;
            }

            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: branch,
              per_page: 1,
            });

            const lastMessage = commits[0]?.commit?.message?.split('\n')[0] || branch;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: lastMessage,
              body: `PR gerado automaticamente a partir do branch \`${branch}\`.\n\n> Revise as mudanças e aprove para fazer merge em \`main\`.`,
              head: branch,
              base: 'main',
            });

            console.log(`PR criado: ${pr.html_url}`);
