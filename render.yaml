services:
  - type: web
    name: a-sol-da-rf
    runtime: python
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ZAPI_INSTANCE_ID
        sync: false
      - key: ZAPI_TOKEN
        sync: false
      - key: ZAPI_CLIENT_TOKEN
        sync: false
      - key: PRODUTTIVO_SESSION_COOKIE
        sync: false
      - key: PRODUTTIVO_ACCOUNT_ID
        value: "20834"
      - key: PRODUTTIVO_BASE_URL
        value: https://app.produttivo.com.br
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
